<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kaplica Matki Bożej Królowej Polski</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #1f3a5f;
  color: white;
  text-align: center;
  padding: 20px;
}

nav {
  background: #2c4f7c;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 10px;
}

nav button {
  background: none;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 10px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* OGŁOSZENIA */
.announcement {
  border-left: 4px solid #1f3a5f;
  padding: 10px;
  margin-bottom: 10px;
}

/* SEPARATOR */
.separator {
  height: 2px;
  background: #1f3a5f;
  margin: 15px 0;
  opacity: 0.4;
}

/* GALERIA */
.gallery {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.gallery img {
  height: 200px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* LIGHTBOX */
#lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  display: none;
  justify-content: center;
  align-items: center;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 10px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <h1>Kaplica Matki Bożej Królowej Polski</h1>
</header>

<nav>
  <button onclick="show('ogloszenia')">Ogłoszenia</button>
  <button onclick="show('galeria')">Galeria</button>
</nav>

<div class="container">

<!-- OGŁOSZENIA -->
<div id="ogloszenia" class="card">
  <h2>Ogłoszenia</h2>

  <div class="announcement">
    <strong>27 maja 2026</strong><br/>
    Msza Święta o 18:00 w intencji parafian.
  </div>

  <div class="announcement">
    <strong>25 maja 2026</strong><br/>
    Nabożeństwo majowe po Mszy wieczornej.
  </div>

  <!-- SEPARATOR -->
  <div class="separator"></div>

  <div class="announcement">
    <strong>Informacja stała</strong><br/>
    Kaplica otwarta 8:00–20:00.
  </div>
</div>

<!-- GALERIA -->
<div id="galeria" class="card hidden">
  <h2>Galeria</h2>

  <div class="gallery">
    <img src="zdjecia/twoje_zdjecie.jpg" onclick="openImg(this.src)">
    <img src="zdjecia/kaplica2.jpg" onclick="openImg(this.src)">
    <img src="zdjecia/kaplica3.jpg" onclick="openImg(this.src)">
  </div>
</div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImg()">
  <img id="lightboxImg">
</div>

<script>
function show(id) {
  document.getElementById("ogloszenia").classList.add("hidden");
  document.getElementById("galeria").classList.add("hidden");
  document.getElementById(id).classList.remove("hidden");
}

// powiększanie zdjęć
function openImg(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").style.display = "flex";
}

function closeImg() {
  document.getElementById("lightbox").style.display = "none";
}
</script>

</body>
</html>
